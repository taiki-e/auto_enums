version: 2
updates:
  - package-ecosystem: cargo # zizmor: ignore[dependabot-cooldown] # Unless dependencies are pinned/locked, the effect is limited.
    directory: /
    schedule:
      interval: daily
    commit-message:
      prefix: ''
    ignore:
      # We support multiple versions of tokio
      - dependency-name: futures
      - dependency-name: tokio
    labels: []
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
    cooldown:
      default-days: 7
    commit-message:
      prefix: ''
    labels: []
